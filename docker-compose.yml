services:

  db:
    image: pgvector/pgvector:pg16
    container_name: agentshield-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentshield_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-agentshield_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentshield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentshield-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-agentshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentshield_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-agentshield_db}
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
